# Codemagic CI/CD — приложение PLANT
# Документация: https://docs.codemagic.io/flutter/flutter-projects/

workflows:
  plant-ios-ipa:
    name: PLANT — сборка IPA (iPhone)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: development
        bundle_identifier: com.plant.messenger

    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/Library/Caches/CocoaPods

    scripts:
      - name: Зависимости Flutter
        script: flutter pub get

      - name: Тесты
        script: flutter test

      - name: CocoaPods
        script: |
          cd ios
          pod install

      - name: Сборка IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/ipa/*.dSYM.zip

    publishing:
      email:
        recipients:
          - user@example.com
        notify:
          success: true
          failure: true
